# 测试环境配置文件
# Ubuntu 虚拟机配置通过环境变量提供

ubuntu_vm:
  host: "{{UBUNTU_VM_HOST}}"
  port: 22
  username: "{{UBUNTU_VM_USER}}"
  private_key: "{{UBUNTU_VM_KEY:-~/.ssh/id_rsa}}"
  test_dir: "{{UBUNTU_VM_TEST_DIR:-/home/testuser/sftp_test}}"

# 真实设备配置
real_device:
  host: "192.168.1.29"
  port: 22
  username: "root"  # 请替换为实际用户名
  password: "{{REAL_DEVICE_PASSWORD}}"  # 请通过环境变量或手动设置
  # 或者使用密钥认证
  # private_key: "~/.ssh/device_key"
  # passphrase: "{{DEVICE_KEY_PASSPHRASE}}"

# 测试数据目录配置
test_data:
  base_dir: "tests/test_data"
  upload_dir: "tests/test_data/uploads"  # 上传测试文件目录
  download_dir: "tests/test_data/downloads"  # 下载文件保存目录
  temp_dir: "tests/test_data/temp"  # 临时文件目录

# SSH连接配置
ssh:
  timeout: 30  # 连接超时时间（秒）
  retry_count: 3  # 重试次数
  retry_delay: 2  # 重试间隔（秒）

# SFTP配置
sftp:
  chunk_size: 8192  # 文件传输块大小（字节）
  verify_checksum: true  # 是否验证文件校验和

# 环境控制变量说明
# UBUNTU_VM_HOST         - Ubuntu VM host or IP
# UBUNTU_VM_USER         - Ubuntu VM username
# UBUNTU_VM_KEY          - Optional SSH private key path
# UBUNTU_VM_TEST_DIR     - Optional remote working directory
# UBUNTU_VM_AVAILABLE=1  - Automatically set by test helpers when VM probe succeeds
# REAL_DEVICE_TEST=1     - Enables real-device tests
